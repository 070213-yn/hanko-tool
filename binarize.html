<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はんこどり - 画像二値化ツール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] } } }
    };
  </script>
  <!-- JSZip: 一括ダウンロード用 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }

    .drop-zone {
      border: 3px dashed #d1d5db;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255,255,255,0.6);
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #6366f1;
      background: rgba(238, 242, 255, 0.8);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
    }

    /* 画像カード */
    .image-card {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 16px;
      transition: box-shadow 0.2s;
    }
    .image-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    /* プレビュー */
    .preview-wrap {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      background: repeating-conic-gradient(#f3f4f6 0% 25%, #fff 0% 50%) 50% / 16px 16px;
    }
    .preview-wrap canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* スライダー */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: linear-gradient(to right, #c7d2fe, #e0e7ff);
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 1px 4px rgba(99,102,241,0.3);
      cursor: pointer;
    }

    /* ボタン */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(99,102,241,0.25);
      transition: all 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.35); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; font-size: 12px; font-weight: 600;
      color: #6366f1; background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15); border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: rgba(99,102,241,0.14); }

    .btn-sm {
      padding: 5px 10px; font-size: 11px; font-weight: 600;
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
      border: 1px solid; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-auto {
      color: #6366f1; background: rgba(99,102,241,0.06);
      border-color: rgba(99,102,241,0.15);
    }
    .btn-auto:hover { background: rgba(99,102,241,0.12); }
    .btn-dl {
      color: #059669; background: rgba(16,185,129,0.06);
      border-color: rgba(16,185,129,0.15);
    }
    .btn-dl:hover { background: rgba(16,185,129,0.12); }
    .btn-remove {
      color: #dc2626; background: rgba(239,68,68,0.06);
      border-color: rgba(239,68,68,0.12);
    }
    .btn-remove:hover { background: rgba(239,68,68,0.12); }

    /* カウントバッジ */
    .count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 20px; height: 20px; padding: 0 6px;
      font-size: 11px; font-weight: 700; color: #fff;
      background: #6366f1; border-radius: 10px;
    }

    /* コントロール行 */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls-divider {
      width: 1px;
      height: 20px;
      background: #e5e7eb;
      flex-shrink: 0;
    }
    @media (max-width: 639px) {
      .controls-divider { display: none; }
      .controls-row { gap: 8px; }
    }

    /* ノイズ除去スライダー */
    .noise-slider {
      width: 80px;
    }

    /* 消しゴムトグル */
    .eraser-toggle {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; font-size: 11px; font-weight: 600;
      color: #6b7280; background: rgba(107,114,128,0.06);
      border: 1px solid rgba(107,114,128,0.15);
      border-radius: 6px; cursor: pointer;
      transition: all 0.15s;
    }
    .eraser-toggle:hover { background: rgba(107,114,128,0.12); }
    .eraser-toggle.active {
      color: #fff;
      background: #f59e0b;
      border-color: #f59e0b;
      box-shadow: 0 1px 4px rgba(245,158,11,0.3);
    }

    /* 消しゴムコントロール */
    .eraser-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 8px;
    }
    .eraser-size-slider {
      width: 80px;
    }

    /* 消しゴムモード時のキャンバスラッパー */
    .eraser-canvas-wrap.eraser-mode {
      cursor: crosshair;
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.2);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-6">
    <!-- ヘッダー -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-xl font-bold text-gray-800">画像二値化ツール</h1>
        <p class="text-xs text-gray-400 mt-0.5">複数画像を同時に処理、個別にしきい値調整可能</p>
      </div>
      <a href="index.html" class="btn-secondary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clip-rule="evenodd"/></svg>
        入稿ツールに戻る
      </a>
    </div>

    <!-- ドロップゾーン -->
    <div id="drop-zone" class="drop-zone mb-5">
      <input type="file" id="file-input" accept="image/*" multiple class="hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-10 h-10 text-gray-300 mx-auto mb-3">
        <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p class="text-gray-500 text-base mb-1">画像をドラッグ&ドロップ</p>
      <p class="text-gray-400 text-sm">またはクリックしてファイルを選択（複数可）</p>
      <p class="text-gray-300 text-xs mt-2">PNG, JPG, BMP 対応</p>
    </div>

    <!-- ツールバー（画像がある時に表示） -->
    <div id="toolbar" class="flex items-center gap-3 mb-5 flex-wrap" style="display: none;">
      <button id="btn-add-more" class="btn-secondary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z"/></svg>
        画像を追加
      </button>
      <button id="btn-auto-all" class="btn-secondary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H4.598a.75.75 0 00-.75.75v3.634a.75.75 0 001.5 0v-2.033l.312.311a7 7 0 0011.712-3.138.75.75 0 00-1.06-.179zm-1.624-7.848a7 7 0 00-11.712 3.138.75.75 0 001.06.179 5.5 5.5 0 019.201-2.466l.312.311H10.117a.75.75 0 000 1.5h3.634a.75.75 0 00.75-.75V1.854a.75.75 0 00-1.5 0v2.033l-.312-.311z" clip-rule="evenodd"/></svg>
        全て自動しきい値
      </button>
      <div class="flex-1"></div>
      <span id="image-count" class="text-xs text-gray-400"></span>
      <button id="btn-download-all" class="btn-primary">
        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4"><path d="M10.75 2.75a.75.75 0 00-1.5 0v8.614L6.295 8.235a.75.75 0 10-1.09 1.03l4.25 4.5a.75.75 0 001.09 0l4.25-4.5a.75.75 0 00-1.09-1.03l-2.955 3.129V2.75z"/><path d="M3.5 12.75a.75.75 0 00-1.5 0v2.5A2.75 2.75 0 004.75 18h10.5A2.75 2.75 0 0018 15.25v-2.5a.75.75 0 00-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z"/></svg>
        一括ダウンロード (ZIP)
      </button>
    </div>

    <!-- 画像カード一覧 -->
    <div id="image-list" class="space-y-4"></div>
  </div>

  <script src="js/binarize.js"></script>
</body>
</html>
