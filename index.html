<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>はんこどり - 入稿データ作成ツール</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fabric.js v5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

  <!-- ag-psd（PSD読み書き）- CommonJSモジュールをブラウザ用にシム -->
  <script>var exports = {}; var module = { exports: exports };</script>
  <script src="https://cdn.jsdelivr.net/npm/ag-psd@latest/dist/browser.min.js"></script>
  <script>var agPsd = module.exports || exports; if (!agPsd.readPsd) agPsd = exports;</script>

  <!-- カスタムCSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100">
  <div id="app">
    <!-- ヘッダー -->
    <header id="header" class="bg-white border-b border-gray-200 px-4 py-2 flex items-center justify-between gap-3">
      <h1 class="text-lg font-bold text-gray-800 whitespace-nowrap">はんこどり</h1>
      <div class="flex items-center gap-2 flex-1 min-w-0">
        <label class="text-sm text-gray-600 whitespace-nowrap">タイトル:</label>
        <input type="text" id="title-input"
               placeholder="入稿データのタイトル"
               class="flex-1 min-w-0 px-2 py-1 text-sm border border-gray-300 rounded focus:outline-none focus:border-blue-400">
      </div>
      <div class="flex items-center gap-3">
        <label class="flex items-center gap-1 text-sm text-gray-600 cursor-pointer">
          <input type="checkbox" id="grid-toggle" checked class="rounded">
          <span>グリッド</span>
        </label>
        <a href="binarize.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium whitespace-nowrap">
          二値化ツール
        </a>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <div id="main-content">
      <!-- PC用サイドバー -->
      <aside id="sidebar" class="p-4">
        <!-- メーカータブ -->
        <div class="flex border-b border-gray-200 mb-4">
          <button class="maker-tab active" data-maker="karafuruya">からふるや</button>
          <button class="maker-tab" data-maker="yamada">ヤマダ</button>
        </div>

        <!-- スタンプ一覧 -->
        <div id="stamp-list" class="mb-4"></div>

        <!-- PSD画像読み込み -->
        <div class="mb-4">
          <div class="section-title">PSD画像読み込み</div>
          <input type="file" id="psd-file-input" accept=".psd,image/vnd.adobe.photoshop,application/x-photoshop,application/photoshop,application/octet-stream" class="hidden">
          <button id="btn-import-psd" class="action-btn w-full mb-2">
            PSDファイルを選択...
          </button>
          <div id="psd-layer-list" class="space-y-2"></div>
        </div>

        <!-- 選択中の枠情報 -->
        <div id="selected-frame-panel" class="mb-4 hidden">
          <div class="section-title">選択中の枠</div>
          <div class="bg-white rounded-lg border border-gray-200 p-3">
            <div class="text-sm font-medium text-gray-700 mb-1" id="selected-frame-id">--</div>
            <div class="text-xs text-gray-500 mb-2" id="selected-frame-size">--</div>
            <!-- 操作状態の表示 -->
            <div id="frame-state-indicator" class="text-xs mb-2">
              <span class="state-select inline-block px-2 py-1 rounded text-blue-600 bg-blue-50">選択中 - もう一度タッチで移動可能</span>
              <span class="state-move hidden inline-block px-2 py-1 rounded text-green-600 bg-green-50">移動可能</span>
            </div>
            <label class="text-xs font-medium text-gray-600 block mb-1">メモ（入稿時に表示）:</label>
            <textarea id="memo-input"
                      placeholder="枠ごとのメモを入力..."
                      rows="2"
                      class="memo-input-field w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-400 resize-none"></textarea>
          </div>
        </div>

        <!-- 整列ツール -->
        <div class="mb-4">
          <div class="section-title">整列ツール</div>
          <div class="grid grid-cols-4 gap-1.5 mb-2">
            <button class="align-btn" data-align="left" title="左揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="4" x2="4" y2="20"/><rect x="7" y="6" width="10" height="4" rx="1"/><rect x="7" y="14" width="6" height="4" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="right" title="右揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="20" y1="4" x2="20" y2="20"/><rect x="7" y="6" width="10" height="4" rx="1"/><rect x="11" y="14" width="6" height="4" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="top" title="上揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="4" x2="20" y2="4"/><rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="7" width="4" height="6" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="bottom" title="下揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="11" width="4" height="6" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="centerH" title="水平中央揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="2 2"/><rect x="5" y="6" width="14" height="4" rx="1"/><rect x="7" y="14" width="10" height="4" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="centerV" title="垂直中央揃え">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="2 2"/><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="7" width="4" height="10" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="distributeH" title="水平均等分布">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="4" x2="4" y2="20"/><line x1="20" y1="4" x2="20" y2="20"/><rect x="8" y="8" width="3" height="8" rx="1"/><rect x="13" y="8" width="3" height="8" rx="1"/>
              </svg>
            </button>
            <button class="align-btn" data-align="distributeV" title="垂直均等分布">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="4" x2="20" y2="4"/><line x1="4" y1="20" x2="20" y2="20"/><rect x="8" y="8" width="8" height="3" rx="1"/><rect x="8" y="13" width="8" height="3" rx="1"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- アクションボタン -->
        <div class="space-y-2">
          <button id="btn-delete-selected" class="action-btn danger" disabled>
            選択を削除
          </button>
          <button id="btn-delete-all" class="action-btn danger">
            全削除
          </button>
          <div class="border-t border-gray-200 pt-2 mt-2"></div>
          <button id="btn-export-psd" class="action-btn primary">
            PSD書出し (600DPI)
          </button>
          <button id="btn-export-png" class="action-btn">
            PNG書出し (1200DPI)
          </button>
          <button id="btn-export-svg" class="action-btn">
            SVG書出し
          </button>
        </div>

        <div class="mt-4 text-xs text-gray-500" id="frame-count">
          配置数: 0
        </div>
      </aside>

      <!-- キャンバスエリア -->
      <div id="canvas-area">
        <div id="canvas-container">
          <canvas id="main-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- ズームバー -->
    <div id="zoom-bar" class="px-4 py-2 flex items-center gap-3">
      <button id="zoom-out" class="text-gray-500 hover:text-gray-700 font-bold text-lg leading-none px-1">-</button>
      <input type="range" id="zoom-slider" min="10" max="500" value="100" class="flex-1">
      <button id="zoom-in" class="text-gray-500 hover:text-gray-700 font-bold text-lg leading-none px-1">+</button>
      <span id="zoom-label" class="text-sm text-gray-600 w-12 text-right">100%</span>
      <button id="zoom-fit" class="text-xs text-blue-600 hover:text-blue-800 ml-2">フィット</button>
    </div>

    <!-- モバイル用下部パネル -->
    <div id="mobile-panel" class="collapsed">
      <div id="mobile-panel-handle"></div>
      <div id="mobile-panel-content">
        <div class="flex border-b border-gray-200 mb-3">
          <button class="maker-tab active" data-maker="karafuruya">からふるや</button>
          <button class="maker-tab" data-maker="yamada">ヤマダ</button>
        </div>
        <div id="mobile-stamp-list" class="mb-3"></div>
        <button id="mobile-btn-import-psd" class="action-btn w-full mb-2">PSD読み込み</button>
        <div id="mobile-psd-layer-list" class="mb-3"></div>
        <!-- 選択中の枠メモ（モバイル） -->
        <div id="mobile-selected-panel" class="mb-3 hidden">
          <div class="text-xs font-medium text-gray-600 mb-1">
            <span id="mobile-frame-id">--</span> メモ:
          </div>
          <textarea id="mobile-memo-input"
                    placeholder="メモ..."
                    rows="2"
                    class="memo-input-field w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-400 resize-none"></textarea>
        </div>
        <div class="flex items-center gap-2 mb-3 flex-wrap">
          <button class="align-btn" data-align="left" title="左揃え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="4" y2="20"/><rect x="7" y="6" width="10" height="4" rx="1"/><rect x="7" y="14" width="6" height="4" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="right" title="右揃え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="20" y1="4" x2="20" y2="20"/><rect x="7" y="6" width="10" height="4" rx="1"/><rect x="11" y="14" width="6" height="4" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="top" title="上揃え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="20" y2="4"/><rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="7" width="4" height="6" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="bottom" title="下揃え">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="20"/><rect x="6" y="7" width="4" height="10" rx="1"/><rect x="14" y="11" width="4" height="6" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="centerH" title="水平中央">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22" stroke-dasharray="2 2"/><rect x="5" y="6" width="14" height="4" rx="1"/><rect x="7" y="14" width="10" height="4" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="centerV" title="垂直中央">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="2 2"/><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="7" width="4" height="10" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="distributeH" title="水平均等">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="4" y2="20"/><line x1="20" y1="4" x2="20" y2="20"/><rect x="8" y="8" width="3" height="8" rx="1"/><rect x="13" y="8" width="3" height="8" rx="1"/></svg>
          </button>
          <button class="align-btn" data-align="distributeV" title="垂直均等">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="20" y2="4"/><line x1="4" y1="20" x2="20" y2="20"/><rect x="8" y="8" width="8" height="3" rx="1"/><rect x="8" y="13" width="8" height="3" rx="1"/></svg>
          </button>
        </div>
        <div class="flex gap-2">
          <button id="mobile-btn-delete" class="action-btn danger flex-1" disabled>削除</button>
          <button id="mobile-btn-clear" class="action-btn danger flex-1">全削除</button>
          <button id="mobile-btn-export" class="action-btn primary flex-1">PSD書出し</button>
        </div>
      </div>
    </div>

    <!-- ローディングオーバーレイ -->
    <div id="loading-overlay">
      <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <p class="text-gray-600" id="loading-text">エクスポート中...</p>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/frame-data.js"></script>
  <script src="js/canvas-manager.js"></script>
  <script src="js/frame-factory.js"></script>
  <script src="js/snap-align.js"></script>
  <script src="js/psd-handler.js"></script>
  <script src="js/exporter.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
